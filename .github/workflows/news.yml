name: Refresh news wire

on:
  schedule:
    # Every 30 minutes, Monday 00:00 UTC through Saturday 00:00 UTC
    # (covers all global trading sessions; quiet on weekends).
    - cron: '*/30 * * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: news-wire
  cancel-in-progress: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Fetch headlines
        run: python3 scripts/fetch_news.py
      - name: Commit if changed
        run: |
          if git diff --quiet -- platform/data/news.json; then
            echo "News unchanged; nothing to commit."
            exit 0
          fi
          git config user.name "meridian-news-bot"
          git config user.email "actions@users.noreply.github.com"
          git add platform/data/news.json
          git commit -m "News wire refresh"
          git push
